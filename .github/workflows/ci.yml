name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest respx
      - run: python -m pytest tests/ -q --tb=short

  sast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Bandit (report all)
        run: |
          pip install bandit
          bandit -r src/ --skip B101 -f txt || true

      - name: Bandit (gate medium+)
        run: bandit -r src/ -q --skip B101,B112 --severity-level medium

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        env:
          SEMGREP_SEND_METRICS: "off"
        with:
          config: auto

  dep-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict --progress-spinner=off

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          scanners: vuln,secret,misconfig
