# L1 Reconciliation -- Baseline
#
# Basic 4-step matching cascade: exact then fuzzy, against both pop3
# (same-source cross-population) and core_parent (trusted reference).
# Uses 2-field address matching (hq_addr1, hq_addr2).
#
# Expected match rate: ~69% (31/45) against the test dataset.
# For higher match rates, see l1_recon_80.yaml (80%) or
# step_defaults_example.yaml (84% with core_parent fallback).

name: L1 Reconciliation
description: Reconcile Pop1 parent IDs to trusted L1 records

sources:
  core_parent:
    file: core_parent_export.csv
    type: trusted_reference
  multi_pop:
    file: tp_multi_pop_dataset.csv
    type: multi_population

populations:
  pop1:
    source: multi_pop
    record_key: vendor_id
    filter:
      - field: vendor_id
        op: starts_with
        value: "V7"
    invalid_fields: [l1_fmly_nm, tpty_l1_id, cntrct_cmpl_dt]
  garbage:
    source: multi_pop
    filter:
      - field: vendor_id
        op: not_starts_with
        value: "V7"
      - field: data_entry_type
        op: eq
        value: "Migrated"
      - field: rq_intk_user
        op: contains_any
        values: ["Data Migration", "Goblindor"]
        join: and
    action: exclude
  pop3:
    source: multi_pop
    filter: []

steps:
  - name: Match Pop1 to core_parent
    source: pop1
    destination: core_parent
    match_fields:
      - source: l3_fmly_nm
        destination: Vendor Name
        method: exact
        tiers: [raw, clean]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [Address1, Address2]
      parser: auto
      threshold: 75
      tiers: [clean]
      weights:
        street_name: 0.6
    date_gate:
      field: Updated
      max_age_years: 2
      applies_to: destination
    inherit:
      - source: Supplier Name
        as: derived_l1_name
      - source: Supplier ID
        as: derived_l1_id

  - name: Match Pop1 to Pop3
    source: pop1
    destination: pop3
    match_fields:
      - source: l3_fmly_nm
        destination: l3_fmly_nm
        method: exact
        tiers: [raw, clean]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [hq_addr1, hq_addr2]
      parser: auto
      threshold: 75
      tiers: [clean]
      weights:
        street_name: 0.6
    date_gate:
      field: cntrct_cmpl_dt
      max_age_years: 2
      applies_to: destination
    inherit:
      - source: l1_fmly_nm
        as: derived_l1_name
      - source: tpty_l1_id
        as: derived_l1_id

  # Fuzzy steps run AFTER exact -- pipeline dedup prefers earlier steps
  - name: Fuzzy Match Pop1 to core_parent
    source: pop1
    destination: core_parent
    match_fields:
      - source: l3_fmly_nm
        destination: Vendor Name
        method: fuzzy
        threshold: 70
        scorer: token_sort_ratio
        tiers: [raw, clean]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [Address1, Address2]
      parser: auto
      threshold: 75
      tiers: [clean]
      weights:
        street_name: 0.6
    date_gate:
      field: Updated
      max_age_years: 2
      applies_to: destination
    inherit:
      - source: Supplier Name
        as: derived_l1_name
      - source: Supplier ID
        as: derived_l1_id

  - name: Fuzzy Match Pop1 to Pop3
    source: pop1
    destination: pop3
    match_fields:
      - source: l3_fmly_nm
        destination: l3_fmly_nm
        method: fuzzy
        threshold: 70
        scorer: token_sort_ratio
        tiers: [raw, clean]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [hq_addr1, hq_addr2]
      parser: auto
      threshold: 75
      tiers: [clean]
      weights:
        street_name: 0.6
    date_gate:
      field: cntrct_cmpl_dt
      max_age_years: 2
      applies_to: destination
    inherit:
      - source: l1_fmly_nm
        as: derived_l1_name
      - source: tpty_l1_id
        as: derived_l1_id

output:
  format: xlsx
  path: output/l1_reconciliation_report.xlsx
  match_mode: best_match
  tabs:
    - name: Matched
      type: matched_records
    - name: Analysis
      type: unmatched_review
  columns:
    matched:
      # Source fields
      - field: l3_fmly_nm
        header: Source L3 Name
      - field: vendor_id
        header: Source Vendor ID
      - field: tpty_assm_nm
        header: Assessment Name
      - field: hq_addr1
        header: Source Address 1
      - field: hq_addr2
        header: Source Address 2
      # Derived L1
      - field: derived_l1_name
        header: Derived L1 Name
      - field: derived_l1_id
        header: Derived L1 ID
      # Match metadata
      - field: match_step
        header: Match Source
      - field: match_tier
        header: Match Tier
      - field: name_score
        header: Name Score
      - field: addr_score
        header: Address Score
      - field: addr_street_match
        header: Street Match
      - field: addr_comparison
        header: Address Comparison
      - field: addr_tier
        header: Address Tier
      # Destination fields (variants coalesced from different steps)
      - fields: [Vendor Name, l3_fmly_nm_dst]
        header: Dest L3 Name
      - fields: [Address1, hq_addr1_dst]
        header: Dest Address 1
      - fields: [Address2, hq_addr2_dst]
        header: Dest Address 2
    analysis:
      - field: l3_fmly_nm
        header: L3 Name
      - field: vendor_id
        header: Vendor ID
      - field: tpty_assm_nm
        header: Assessment Name
      - field: hq_addr1
        header: Address 1
      - field: hq_addr2
        header: Address 2
      - field: l1_fmly_nm
        header: L1 Name (invalid)
      - field: tpty_l1_id
        header: L1 ID (invalid)
      - field: data_entry_type
        header: Data Entry Type
      - field: rq_intk_user
        header: Request User
      - field: reason_code
        header: Reason Code
      - field: rejection_step
        header: Rejection Step
      - field: best_rejected_score
        header: Best Rejected Score

normalization:
  stopwords: config/stopwords.json
  aliases: config/aliases.json
  unicode:
    ranges: config/unicode_ranges.json
    mode: profile_only
