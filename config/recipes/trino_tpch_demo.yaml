# Demo: Reconcile "migrated" parts catalog against trusted reference
#
# To test locally see [trino-quickstart](../../docs/trino-quickstart.md)
# Run:
#   export TRINO_HOST=<trino-host>
# Dry run first:
#   python3 -m src --recipe config/recipes/trino_tpch_demo.yaml --dry-run
# Sample Test:
#   python3 -m src --recipe config/recipes/trino_tpch_demo.yaml

name: TPCH Parts Catalog Reconciliation
description: >
  Reconcile migrated parts records (reordered/truncated names) against
  a trusted parts catalog. Demonstrates fuzzy matching with Trino data.

sources:
  # "Migration export" -- names mangled by reversing word order and uppercasing
  migrated_parts:
    loader: sql
    driver: trino
    connection:
      host: ${TRINO_HOST}
      port: 8085
      user: test
      catalog: tpch
      schema: tiny
    query: |
      SELECT
        'MIG-' || CAST(p.partkey AS VARCHAR) AS vendor_id,
        UPPER(ARRAY_JOIN(REVERSE(SPLIT(p.name, ' ')), ' ')) AS vendor_name,
        SUBSTR(p.type, 1, 12) AS address_line1,
        p.mfgr AS mfgr,
        p.brand AS brand
      FROM part p
      WHERE p.mfgr IN ('Manufacturer#1', 'Manufacturer#2')
    type: multi_population

  # "Trusted catalog" -- clean full records
  trusted_catalog:
    loader: sql
    driver: trino
    connection:
      host: ${TRINO_HOST}
      port: 8085
      user: test
      catalog: tpch
      schema: tiny
    query: |
      SELECT
        CAST(p.partkey AS VARCHAR) AS vendor_id,
        p.name AS vendor_name,
        p.type AS address_line1,
        p.mfgr AS mfgr,
        p.brand AS brand
      FROM part p
      WHERE p.mfgr IN ('Manufacturer#1', 'Manufacturer#2')
    type: trusted_reference

populations:
  migrated:
    source: migrated_parts
    record_key: vendor_id
    filter:
      - field: brand
        op: starts_with
        value: "Brand#1"

  reference:
    source: trusted_catalog
    record_key: vendor_id
    filter:
      - field: brand
        op: starts_with
        value: "Brand#1"

steps:
  - name: Exact name match
    source: migrated
    destination: reference
    match_fields:
      - source: vendor_name
        destination: vendor_name
        method: exact
        tiers: [raw, clean]

  - name: Fuzzy name match
    source: migrated
    destination: reference
    match_fields:
      - source: vendor_name
        destination: vendor_name
        method: fuzzy
        threshold: 60
        tiers: [clean]

output:
  format: xlsx
  summary: [md, xlsx]
  path: output/tpch_demo_results.xlsx
  match_mode: best_match
  tabs:
    - name: Matched
      type: matched_records
    - name: Unmatched
      type: unmatched_review
  columns:
    matched:
      - field: vendor_id
        header: Migrated ID
      - field: vendor_name
        header: Migrated Name (mangled)
      - field: address_line1
        header: Migrated Type
      - field: brand
        header: Brand
      - field: match_step
        header: Match Step
      - field: match_tier
        header: Match Tier
      - field: name_score
        header: Name Score
