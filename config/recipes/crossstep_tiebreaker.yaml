name: Cross-Step Tie-Breaker Spike
description: >
  Reproduces the cross-step rollup problem. V001 and V002/V003 belong to the
  same L1 entity (Company XYZ Holdings) but resolve to different supplier IDs
  because V001 matches at the L3-exact step (S1013) while V002/V003 only reach
  a match at the L1 step (S0500). The per-step tie-breaker cannot unify them.

sources:
  source_data:
    file: crossstep_source.csv
    type: multi_population
  dest_data:
    file: crossstep_dest.csv
    type: trusted_reference

populations:
  source_pop:
    source: source_data
    record_key: vendor_id
    filter: []

steps:
  - name: Exact Name Match L3
    source: source_pop
    destination: dest_data
    match_fields:
      - source: l3_fmly_nm
        destination: vnd_name
        method: exact
        tiers: [raw]
    inherit:
      - source: supplier_id
        as: derived_supplier_id
      - source: supplier_nm
        as: derived_supplier_nm
      - source: vnd_name
        as: derived_dest_name

  - name: Exact Name Match L1
    source: source_pop
    destination: dest_data
    match_fields:
      - source: parent_name
        destination: supplier_nm
        method: exact
        tiers: [raw]
    inherit:
      - source: supplier_id
        as: derived_supplier_id
      - source: supplier_nm
        as: derived_supplier_nm
      - source: vnd_name
        as: derived_dest_name

  - name: Fuzzy Name Match L3
    source: source_pop
    destination: dest_data
    match_fields:
      - source: l3_fmly_nm
        destination: vnd_name
        method: fuzzy
        threshold: 70
        scorer: token_sort_ratio
        tiers: [raw]
    inherit:
      - source: supplier_id
        as: derived_supplier_id
      - source: supplier_nm
        as: derived_supplier_nm
      - source: vnd_name
        as: derived_dest_name

  - name: Fuzzy Name Match L1
    source: source_pop
    destination: dest_data
    match_fields:
      - source: parent_name
        destination: supplier_nm
        method: fuzzy
        threshold: 70
        scorer: token_sort_ratio
        tiers: [raw]
    inherit:
      - source: supplier_id
        as: derived_supplier_id
      - source: supplier_nm
        as: derived_supplier_nm
      - source: vnd_name
        as: derived_dest_name

output:
  format: xlsx
  summary: [md]
  match_mode: best_match
  tie_breaker:
    column: supplier_id
    strip_prefix: alpha
    order: asc
  columns:
    matched:
      - field: vendor_id
        header: Source ID
      - field: parent_name
        header: Source L1 Name
      - field: l3_fmly_nm
        header: Source L3 Name
      - field: match_step
        header: Match Source
      - field: match_tier
        header: Tier
      - field: name_score
        header: Name Score
      - field: derived_dest_name
        header: Dest L3 Name
      - field: derived_supplier_nm
        header: Dest L1 Name
      - field: derived_supplier_id
        header: Supplier ID (selected)
    analysis:
      - field: vendor_id
        header: Source ID
      - field: l3_fmly_nm
        header: Source L3 Name
      - field: reason_code
        header: Reason
