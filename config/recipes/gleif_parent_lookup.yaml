# GLEIF Parent Lookup - Multi-Phase Pipeline
#
# Resolves internal vendor names to their GLEIF parent company hierarchy.
#
# Phase 1: Match vendor names against GLEIF Level 1 (LEI-CDF) to find LEI
# Phase 2: Match LEIs against Level 2 RR (Relationship Records) to find
#           the direct accounting consolidating parent LEI
# Phase 3: Match parent LEIs back against Level 1 to resolve parent name
#           and country
#
# Data flow:
#   Internal Vendors -> GLEIF L1 (who is who)
#                    -> GLEIF L2 RR (who owns whom)
#                    -> GLEIF L1 (resolve parent identity)
#
# See docs/gleif_parent_matching_design_note.md for full design.

name: GLEIF Parent Lookup (Multi-Phase)
description: >
  Match internal vendor names to GLEIF LEI, resolve direct parent
  relationships via Level 2 RR, then resolve parent entity names
  and country from Level 1. Produces a rollup showing vendor ->
  LEI -> parent LEI -> parent name.

sources:
  vendors:
    file: gleif_test_vendors.csv

  gleif_lei:
    loader: http
    url_from:
      endpoint: "https://leidata-preview.gleif.org/api/v2/golden-copies/publishes?page=1"
      json_path: "data[0].lei2.full_file.csv.url"
    format: zip
    columns:
      - LEI
      - Entity.LegalName
      - Entity.LegalAddress.FirstAddressLine
      - Entity.LegalAddress.City
      - Entity.LegalAddress.Country
      - Entity.HeadquartersAddress.Country
      - Entity.LegalJurisdiction
      - Entity.EntityStatus
      - Registration.RegistrationStatus
    cache_ttl: "7d"
    cache_format: csv
    timeout: 300

  gleif_rr:
    loader: http
    url_from:
      endpoint: "https://leidata-preview.gleif.org/api/v2/golden-copies/publishes?page=1"
      json_path: "data[0].rr.full_file.csv.url"
    format: zip
    columns:
      - Relationship.StartNode.NodeID
      - Relationship.EndNode.NodeID
      - Relationship.RelationshipType
      - Relationship.RelationshipStatus
      - Relationship.EndNode.NodeIDType
      - Registration.RegistrationStatus
    cache_ttl: "7d"
    cache_format: csv
    timeout: 300

phases:
  - name: "Phase 1: Match vendors to LEI"
    populations:
      vendor_pop:
        source: vendors
        record_key: Vendor ID
        filter: []
      gleif_active:
        source: gleif_lei
        record_key: LEI
        filter:
          - field: Entity.EntityStatus
            op: eq
            value: "ACTIVE"
          - field: Registration.RegistrationStatus
            op: eq
            value: "ISSUED"
    steps:
      - name: Exact vendor name to LEI
        source: vendor_pop
        destination: gleif_active
        match_fields:
          - source: Vendor Name
            destination: Entity.LegalName
            method: exact
            tiers: [raw, clean, normalized]
      - name: Fuzzy vendor name to LEI
        source: vendor_pop
        destination: gleif_active
        match_fields:
          - source: Vendor Name
            destination: Entity.LegalName
            method: fuzzy
            threshold: 88
            tiers: [clean, normalized]

  - name: "Phase 2: Resolve parent LEI from RR"
    populations:
      matched_entities:
        source: _previous_matched
        record_key: LEI
        filter: []
      rr_direct_parents:
        source: gleif_rr
        record_key: Relationship.StartNode.NodeID
        filter:
          - field: Relationship.RelationshipType
            op: eq
            value: "IS_DIRECTLY_CONSOLIDATED_BY"
          - field: Relationship.RelationshipStatus
            op: eq
            value: "ACTIVE"
          - field: Relationship.EndNode.NodeIDType
            op: eq
            value: "LEI"
          - field: Registration.RegistrationStatus
            op: eq
            value: "PUBLISHED"
    steps:
      - name: Match child LEI to parent relationship
        source: matched_entities
        destination: rr_direct_parents
        match_fields:
          - source: LEI
            destination: Relationship.StartNode.NodeID
            method: exact
            tiers: [raw]

  - name: "Phase 3: Resolve parent name from LEI"
    populations:
      matched_with_parent:
        source: _previous_matched
        record_key: Relationship.EndNode.NodeID
        filter: []
      gleif_entities:
        source: gleif_lei
        record_key: LEI
        filter:
          - field: Entity.EntityStatus
            op: eq
            value: "ACTIVE"
          - field: Registration.RegistrationStatus
            op: eq
            value: "ISSUED"
    steps:
      - name: Resolve parent LEI to entity name
        source: matched_with_parent
        destination: gleif_entities
        match_fields:
          - source: Relationship.EndNode.NodeID
            destination: LEI
            method: exact
            tiers: [raw]

output:
  format: xlsx
  path: output/gleif_parent_lookup_results.xlsx
  match_mode: best_match
  columns:
    matched:
      - field: Vendor ID
        header: Vendor ID
      - field: Vendor Name
        header: Vendor Name
      - field: Country
        header: Vendor Country
      - field: Internal Parent
        header: Internal Parent (Expected)
      - field: LEI
        header: Matched LEI
      - field: Entity.LegalName
        header: GLEIF Legal Name
      - field: Entity.LegalAddress.Country
        header: Entity Country
      - field: Entity.EntityStatus
        header: Entity Status
      - field: Relationship.EndNode.NodeID
        header: Parent LEI
      - field: Entity.LegalName_dst2
        header: Parent Legal Name
      - field: Entity.LegalAddress.Country_dst2
        header: Parent Country
      - field: Entity.HeadquartersAddress.Country_dst2
        header: Parent HQ Country
      - field: match_step
        header: Match Method
      - field: match_tier
        header: Match Tier
      - field: name_score
        header: Match Score
    analysis:
      - field: Vendor ID
        header: Vendor ID
      - field: Vendor Name
        header: Vendor Name
      - field: Country
        header: Vendor Country
      - field: Internal Parent
        header: Internal Parent (Expected)
      - field: reason_code
        header: Unmatched Reason
      - field: rejection_step
        header: Rejected At Step
      - field: best_rejected_score
        header: Best Rejected Score
