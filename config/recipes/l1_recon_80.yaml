# L1 Reconciliation -- 80% Target
#
# 4-step matching against pop3 only (no core_parent fallback).
# Uses street_weight=0.75 for address scoring to emphasize street
# name matches over city/state. Produces ~80% match rate (36/45).
#
# For a version with core_parent fallback (84%), see
# step_defaults_example.yaml.

name: L1 Reconc Rollup 80 All
description: Reconcile Pop1 parent IDs to trusted L1 records

sources:
  core_parent:
    file: core_parent_export.csv
    type: trusted_reference
  multi_pop:
    file: tp_multi_pop_dataset.csv
    type: multi_population

populations:
  pop1:
    source: multi_pop
    record_key: vendor_id
    filter:
      - field: vendor_id
        op: starts_with
        value: "V7"
  pop3:
    source: multi_pop
    filter: []

steps:
  - name: Exact Match Pop1 L3 to Pop3 L3
    source: pop1
    destination: pop3
    match_fields:
      - source: l3_fmly_nm
        destination: l3_fmly_nm
        method: exact
        tiers: [raw, clean, normalized]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [hq_addr1, hq_addr2]
      parser: auto
      tiers: [clean]
      threshold: 75
      weights:
        street_name: 0.75
    inherit:
      - source: l1_fmly_nm
        as: derived_l1_name
      - source: tpty_l1_id
        as: derived_l1_id
      - source: l3_fmly_nm
        as: derived_l3_name
      - source: vendor_id
        as: derived_l3_id
      - source: cntrct_cmpl_dt
        as: derived_cntrc_cmpl_dt
      - source: hq_addr1
        as: derived_hq_addr1
      - source: hq_addr2
        as: derived_hq_addr2
      - source: tpty_assm_nm
        as: derived_assm_nm

  - name: Exact Match Pop1 L1 to Pop3 L1
    source: pop1
    destination: pop3
    match_fields:
      - source: l1_fmly_nm
        destination: l1_fmly_nm
        method: exact
        tiers: [raw, clean, normalized]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [hq_addr1, hq_addr2]
      parser: auto
      tiers: [clean]
      weights:
        street_name: 0.75
    inherit:
      - source: l1_fmly_nm
        as: derived_l1_name
      - source: tpty_l1_id
        as: derived_l1_id
      - source: l3_fmly_nm
        as: derived_l3_name
      - source: vendor_id
        as: derived_l3_id
      - source: cntrct_cmpl_dt
        as: derived_cntrc_cmpl_dt
      - source: hq_addr1
        as: derived_hq_addr1
      - source: hq_addr2
        as: derived_hq_addr2
      - source: tpty_assm_nm
        as: derived_assm_nm

  # Fuzzy steps run AFTER exact -- pipeline dedup prefers earlier steps
  - name: Fuzzy Match Pop1 L3 to Pop3 L3
    source: pop1
    destination: pop3
    match_fields:
      - source: l3_fmly_nm
        destination: l3_fmly_nm
        method: fuzzy
        threshold: 75
        scorer: token_sort_ratio
        tiers: [raw, clean, normalized]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [hq_addr1, hq_addr2]
      parser: auto
      tiers: [clean]
      weights:
        street_name: 0.75
    inherit:
      - source: l1_fmly_nm
        as: derived_l1_name
      - source: tpty_l1_id
        as: derived_l1_id
      - source: l3_fmly_nm
        as: derived_l3_name
      - source: vendor_id
        as: derived_l3_id
      - source: cntrct_cmpl_dt
        as: derived_cntrc_cmpl_dt
      - source: hq_addr1
        as: derived_hq_addr1
      - source: hq_addr2
        as: derived_hq_addr2
      - source: tpty_assm_nm
        as: derived_assm_nm

  - name: Fuzzy Match Pop1 L1 to Pop3 L1
    source: pop1
    destination: pop3
    match_fields:
      - source: l1_fmly_nm
        destination: l1_fmly_nm
        method: fuzzy
        threshold: 75
        scorer: token_sort_ratio
        tiers: [raw, clean, normalized]
    address_support:
      source: [hq_addr1, hq_addr2]
      destination: [hq_addr1, hq_addr2]
      parser: auto
      tiers: [clean]
      weights:
        street_name: 0.75
    inherit:
      - source: l1_fmly_nm
        as: derived_l1_name
      - source: tpty_l1_id
        as: derived_l1_id
      - source: l3_fmly_nm
        as: derived_l3_name
      - source: vendor_id
        as: derived_l3_id
      - source: cntrct_cmpl_dt
        as: derived_cntrc_cmpl_dt
      - source: hq_addr1
        as: derived_hq_addr1
      - source: hq_addr2
        as: derived_hq_addr2
      - source: tpty_assm_nm
        as: derived_assm_nm

output:
  format: xlsx
  path: output/l1_reconciliation_report.xlsx
  match_mode: best_match
  tabs:
    - name: Matched
      type: matched_records
    - name: Analysis
      type: unmatched_review
  columns:
    matched:
      # Name Match Config
      - field: match_step
        header: Match Source
      - field: match_tier
        header: Match Tier
      - field: name_score
        header: Name Score
      ## Source L3 to Dest L3
      - field: vendor_id
        header: Source L1 ID
      - field: l3_fmly_nm
        header: Source L3 Name
      - field: derived_l3_id
        header: Dest L3 ID
      - field: derived_l3_name
        header: Dest L3 Name
      ## Source L1 to Dest L1      
      - field: l1_fmly_nm
        header: Source L1 Name
      - field: tpty_l1_id
        header: Source L1 ID
      - field: derived_l1_name
        header: Derived L1 Name
      - field: derived_l1_id
        header: Derived L1 ID
      # Address Scoring Config
      - field: addr_score
        header: Address Score
      - field: addr_street_match
        header: Street Match
      - field: addr_comparison
        header: Address Comparison
      - field: addr_tier
        header: Address Tier
      ## Source to Destination Address
      - field: hq_addr1
        header: Source Address 1
      - field: hq_addr2
        header: Source Address 2
      - field: derived_hq_addr1
        header: Dest Address 1
      - field: derived_hq_addr2
        header: Dest Address 2
      # Source to Destination Assessments
      - field: tpty_assm_nm
        header: Source Assmnt Name
      - field: derived_assm_nm
        header: Dest Assmnt Name
      # Additional Detail
      - field: data_entry_type
        header: Data Entry Type
      - field: rq_intk_user
        header: Request User

    analysis:
      # Analysis Detail
      - field: reason_code
        header: Reason Code
      - field: rejection_step
        header: Rejection Step
      - field: best_rejected_score
        header: Best Rejected Score
      # L3 
      - field: vendor_id
        header: L3 ID
      - field: l3_fmly_nm
        header: L3 Name
      # L1
      - field: l1_fmly_nm
        header: Source L1 Name
      - field: tpty_l1_id
        header: Source L1 ID
      # Assessment
      - field: tpty_assm_nm
        header: Assessment Name
      # Address
      - field: hq_addr1
        header: Address 1
      - field: hq_addr2
        header: Address 2
      # Additional Detail
      - field: data_entry_type
        header: Data Entry Type
      - field: rq_intk_user
        header: Request User

normalization:
  stopwords: config/stopwords.json
  aliases: config/aliases.json
  unicode:
    ranges: config/unicode_ranges.json
    mode: profile_only
