name: Decision Record Lexicographic Test
description: >
  Issue #93 no-abort case: compare_columns pointed at a text column. The run
  must complete and fall back to a lexicographic comparison on the stripped
  strings rather than failing on the data.

sources:
  src:
    file: dr_source.csv
  dst:
    file: dr_dest.csv

populations:
  pop1:
    source: src
    record_key: vnd_id
    filter: []

steps:
  - name: Exact L3
    source: pop1
    destination: dst
    match_fields:
      - source: l3_fmly_nm
        destination: dst_l3_nm
        method: exact
        tiers: [raw, clean]
    inherit:
      - source: dst_revenue
        as: dst_revenue

output:
  format: csv
  matched_unmatched: [merged, separate]
  match_mode: best_match
  compare_columns:
    # l3_fmly_nm never parses as an integer, so every populated row takes the
    # lexicographic branch instead of aborting the run.
    - left: l3_fmly_nm
      right: dst_revenue
      output: text_cmp
      strip_prefix: none
  columns:
    matched:
      - field: vnd_id
        header: vnd_id
      - field: text_cmp
        header: text_cmp
